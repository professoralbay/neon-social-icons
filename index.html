<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS Glowing Icons</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      background-image:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
      padding: 60px;
    }

    /* Base icon box */
    .icon {
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      border: 2px solid;
      cursor: pointer;
      position: relative;
      transition: transform .35s cubic-bezier(.34,1.56,.64,1), box-shadow .35s ease, background .35s ease;
    }

    .icon svg {
      width: 48px;
      height: 48px;
      transition: filter .35s ease;
    }

    /* Float animations — each icon staggered */
    .icon:nth-child(1) { animation: float 3s 0.0s ease-in-out infinite, flickerW 8s 1.0s ease-in-out infinite; }
    .icon:nth-child(2) { animation: float 3s 0.4s ease-in-out infinite, flickerB 8s 2.5s ease-in-out infinite; }
    .icon:nth-child(3) { animation: float 3s 0.8s ease-in-out infinite, flickerP 8s 4.0s ease-in-out infinite; }
    .icon:nth-child(4) { animation: float 3s 1.2s ease-in-out infinite, flickerF 8s 0.5s ease-in-out infinite; }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-10px); }
    }

    .icon:hover {
      transform: translateY(-16px) scale(1.12) !important;
      animation-play-state: paused;
    }

    /* ── APPLE — white/silver ── */
    .apple {
      color: #e8e8e8;
      border-color: rgba(232,232,232,.35);
      background: rgba(232,232,232,.05);
      box-shadow: 0 0 8px rgba(232,232,232,.2), 0 0 20px rgba(232,232,232,.1), inset 0 0 12px rgba(232,232,232,.05);
    }
    .apple svg { filter: drop-shadow(0 0 8px #fff) drop-shadow(0 0 16px rgba(255,255,255,.6)); }
    .apple:hover {
      background: rgba(232,232,232,.12);
      box-shadow: 0 0 16px rgba(255,255,255,.5), 0 0 40px rgba(255,255,255,.3), 0 0 80px rgba(255,255,255,.15), inset 0 0 20px rgba(255,255,255,.08);
    }
    .apple:hover svg { filter: drop-shadow(0 0 12px #fff) drop-shadow(0 0 30px #fff) drop-shadow(0 0 50px rgba(220,220,220,.8)); }

    /* ── FACEBOOK — blue ── */
    .facebook {
      color: #1877f2;
      border-color: rgba(24,119,242,.35);
      background: rgba(24,119,242,.05);
      box-shadow: 0 0 8px rgba(24,119,242,.2), 0 0 20px rgba(24,119,242,.1), inset 0 0 12px rgba(24,119,242,.05);
    }
    .facebook svg { filter: drop-shadow(0 0 8px #1877f2) drop-shadow(0 0 16px rgba(24,119,242,.6)); }
    .facebook:hover {
      background: rgba(24,119,242,.12);
      box-shadow: 0 0 16px rgba(24,119,242,.6), 0 0 40px rgba(24,119,242,.4), 0 0 80px rgba(24,119,242,.2), inset 0 0 20px rgba(24,119,242,.08);
    }
    .facebook:hover svg { filter: drop-shadow(0 0 12px #1877f2) drop-shadow(0 0 30px #1877f2) drop-shadow(0 0 50px rgba(24,119,242,.8)); }

    /* ── GITHUB — purple ── */
    .github {
      color: #b44dff;
      border-color: rgba(180,77,255,.35);
      background: rgba(180,77,255,.05);
      box-shadow: 0 0 8px rgba(180,77,255,.2), 0 0 20px rgba(180,77,255,.1), inset 0 0 12px rgba(180,77,255,.05);
    }
    .github svg { filter: drop-shadow(0 0 8px #b44dff) drop-shadow(0 0 16px rgba(180,77,255,.6)); }
    .github:hover {
      background: rgba(180,77,255,.12);
      box-shadow: 0 0 16px rgba(180,77,255,.6), 0 0 40px rgba(180,77,255,.4), 0 0 80px rgba(180,77,255,.2), inset 0 0 20px rgba(180,77,255,.08);
    }
    .github:hover svg { filter: drop-shadow(0 0 12px #b44dff) drop-shadow(0 0 30px #b44dff) drop-shadow(0 0 50px rgba(180,77,255,.8)); }

    /* ── INSTAGRAM — pink/orange ── */
    .instagram {
      color: #e1306c;
      border-color: rgba(225,48,108,.35);
      background: rgba(225,48,108,.05);
      box-shadow: 0 0 8px rgba(225,48,108,.2), 0 0 20px rgba(225,48,108,.1), inset 0 0 12px rgba(225,48,108,.05);
    }
    .instagram svg { filter: drop-shadow(0 0 8px #e1306c) drop-shadow(0 0 16px rgba(225,48,108,.6)); }
    .instagram:hover {
      background: rgba(225,48,108,.12);
      box-shadow: 0 0 16px rgba(225,48,108,.6), 0 0 40px rgba(225,48,108,.4), 0 0 80px rgba(225,48,108,.2), inset 0 0 20px rgba(225,48,108,.08);
    }
    .instagram:hover svg { filter: drop-shadow(0 0 12px #e1306c) drop-shadow(0 0 30px #e1306c) drop-shadow(0 0 50px rgba(225,48,108,.8)); }

    /* Flicker keyframes */
    @keyframes flickerW { 0%,89%,91%,93%,100%{opacity:1;} 90%{opacity:.7;} 92%{opacity:.9;} }
    @keyframes flickerB { 0%,85%,87%,89%,100%{opacity:1;} 86%{opacity:.6;} 88%{opacity:.85;} }
    @keyframes flickerP { 0%,78%,80%,82%,100%{opacity:1;} 79%{opacity:.65;} 81%{opacity:.9;} }
    @keyframes flickerF { 0%,72%,74%,76%,100%{opacity:1;} 73%{opacity:.6;} 75%{opacity:.88;} }
  </style>
</head>
<body>
